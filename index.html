<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRATCH — Pocket Golf</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2d7a3a;
  --fairway: #5ab54a;
  --sand: #e8a84a;
  --water: #3a7fd4;
  --red: #d63c2a;
  --cream: #f5f0e8;
  --ink: #1a1a1a;
  --tee: #c8e64a;
  --trees: #1e4a1e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a2e1a;
  font-family: 'Poppins', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  text-align: center;
  padding: 1.5rem 1rem 0.5rem;
  border-bottom: 2px solid #2d4a2d;
}
header h1 {
  font-family: 'Fraunces', serif;
  font-size: 2.8rem;
  color: var(--tee);
  letter-spacing: 4px;
  text-shadow: 3px 3px 0 #0a1a0a;
}
header p { font-size: 0.75rem; color: #7ab87a; letter-spacing: 2px; margin-top: 2px; }

.hole-nav {
  display: flex;
  gap: 8px;
  padding: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}
.hole-tab {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 1px;
  padding: 6px 16px;
  border: 1.5px solid #3a5a3a;
  border-radius: 20px;
  background: transparent;
  color: #7ab87a;
  cursor: pointer;
  transition: all 0.15s;
}
.hole-tab.active {
  background: var(--tee);
  color: var(--ink);
  border-color: var(--tee);
  font-weight: 500;
}

.game-area {
  display: flex;
  gap: 16px;
  padding: 0 1rem 2rem;
  max-width: 860px;
  width: 100%;
  align-items: flex-start;
  justify-content: center;
}

.hole-display {
  position: relative;
  flex-shrink: 0;
  border: 3px solid #2d4a2d;
  border-radius: 8px;
  overflow: hidden;
  width: 280px;
}
.hole-img {
  display: block;
  width: 100%;
  height: auto;
}
.ball-marker {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  border: 3px solid var(--red);
  box-shadow: 0 0 0 2px white, 0 2px 8px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
  transition: top 0.45s cubic-bezier(0.34,1.56,0.64,1), left 0.45s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  z-index: 10;
}
.ball-marker::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ink);
}

.panel {
  flex: 1;
  min-width: 220px;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: #0e1e0e;
  border: 1px solid #2d4a2d;
  border-radius: 8px;
  padding: 12px;
}
.card-label {
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: #5a8a5a;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.score-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.score-box { text-align: center; }
.score-val {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  color: var(--tee);
  line-height: 1;
}
.score-sub { font-size: 0.55rem; color: #5a8a5a; letter-spacing: 1px; margin-top: 2px; }

.shot-btns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}
.shot-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  padding: 9px 4px;
  border: 1.5px solid #3a5a3a;
  border-radius: 6px;
  background: #0e1e0e;
  color: #9aca9a;
  cursor: pointer;
  transition: all 0.12s;
  text-align: center;
  line-height: 1.4;
}
.shot-btn:hover { border-color: #6ab06a; color: white; }
.shot-btn.active { background: var(--green); border-color: var(--fairway); color: white; }
.shot-btn span { display: block; font-size: 0.5rem; color: #5a8a5a; margin-top: 2px; }
.shot-btn.active span { color: #b8e8b8; }

.dir-pad {
  display: grid;
  grid-template-columns: repeat(3, 40px);
  gap: 4px;
  margin: 0 auto;
  width: fit-content;
}
.dir-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 1rem;
  width: 40px; height: 40px;
  border: 1.5px solid #3a5a3a;
  border-radius: 5px;
  background: #0e1e0e;
  color: #9aca9a;
  cursor: pointer;
  text-align: center;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dir-btn:hover { border-color: #6ab06a; color: white; }
.dir-btn.active { background: #1a4a3a; border-color: #4ab88a; color: white; }
.dir-btn.empty { border: none; background: transparent; cursor: default; pointer-events: none; }

.roll-btn {
  width: 100%;
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  letter-spacing: 2px;
  padding: 13px;
  border: 2px solid var(--tee);
  border-radius: 8px;
  background: transparent;
  color: var(--tee);
  cursor: pointer;
  transition: all 0.15s;
}
.roll-btn:hover:not(:disabled) { background: var(--tee); color: var(--ink); }
.roll-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #3a5a3a; color: #3a5a3a; }

.log {
  font-size: 0.68rem;
  line-height: 1.8;
  color: #9aca9a;
  min-height: 70px;
}
.log .hi { color: var(--tee); }
.log .warn { color: #e8a84a; }
.log .bad { color: var(--red); }
.log .good { color: #4adb7a; }

.hole-complete { text-align: center; padding: 6px 0; }
.result-word {
  font-family: 'Fraunces', serif;
  font-size: 1.8rem;
  line-height: 1;
  margin-bottom: 4px;
}
.r-eagle { color: #f5d742; }
.r-birdie { color: #4adb7a; }
.r-par { color: var(--tee); }
.r-bogey { color: var(--sand); }
.r-bad { color: var(--red); }

.sc-wrap { width: 100%; max-width: 860px; padding: 0 1rem 2rem; }
.sc-title { font-size: 0.6rem; letter-spacing: 2px; color: #5a8a5a; margin-bottom: 6px; }
.sc-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 4px; }
.sc-cell { text-align: center; padding: 5px 4px; border: 1px solid #2d4a2d; border-radius: 4px; color: #9aca9a; font-size: 0.68rem; }
.sc-cell.hdr { color: #5a8a5a; font-size: 0.55rem; letter-spacing: 1px; }
.sc-under { color: #4adb7a; }
.sc-over { color: var(--red); }
.sc-par { color: var(--tee); }

@media (max-width: 580px) {
  .game-area { flex-direction: column; align-items: center; }
  .hole-display { width: 100%; max-width: 320px; }
  .panel { max-width: 320px; width: 100%; }
}
</style>
</head>
<body>

<header>
  <h1>SCRATCH</h1>
  <p>pocket golf · 3 holes</p>
</header>

<div class="hole-nav">
  <button class="hole-tab active" onclick="goToHole(0)">Hole 1 · Par 3</button>
  <button class="hole-tab" onclick="goToHole(1)">Hole 2 · Par 4</button>
  <button class="hole-tab" onclick="goToHole(2)">Hole 3 · Par 5</button>
</div>

<div class="game-area">
  <div class="hole-display" id="hole-display">
    <img class="hole-img" id="hole-img" src="" alt="Hole" draggable="false">
    <div class="ball-marker" id="ball"></div>
  </div>

  <div class="panel">
    <div class="card">
      <div class="card-label">scorecard</div>
      <div class="score-row">
        <div class="score-box"><div class="score-val" id="sc-hole">1</div><div class="score-sub">hole</div></div>
        <div class="score-box"><div class="score-val" id="sc-par">3</div><div class="score-sub">par</div></div>
        <div class="score-box"><div class="score-val" id="sc-strokes">0</div><div class="score-sub">strokes</div></div>
      </div>
    </div>

    <div class="card" id="dir-card">
      <div class="card-label">1 · aim</div>
      <div class="dir-pad">
        <button class="dir-btn" onclick="selectDir('ul')">↖</button>
        <button class="dir-btn" onclick="selectDir('u')">↑</button>
        <button class="dir-btn" onclick="selectDir('ur')">↗</button>
        <button class="dir-btn" onclick="selectDir('l')">←</button>
        <button class="dir-btn empty"></button>
        <button class="dir-btn" onclick="selectDir('r')">→</button>
        <button class="dir-btn" onclick="selectDir('dl')">↙</button>
        <button class="dir-btn" onclick="selectDir('d')">↓</button>
        <button class="dir-btn" onclick="selectDir('dr')">↘</button>
      </div>
    </div>

    <div class="card" id="shot-card">
      <div class="card-label">2 · choose shot</div>
      <div class="shot-btns">
        <button class="shot-btn" onclick="selectShot('power')" id="btn-power">POWER<span>move 2–4</span></button>
        <button class="shot-btn" onclick="selectShot('control')" id="btn-control">CONTROL<span>move 1–3</span></button>
        <button class="shot-btn" onclick="selectShot('finesse')" id="btn-finesse">FINESSE<span>move 1–2</span></button>
      </div>
    </div>

    <button class="roll-btn" id="roll-btn" onclick="rollShot()" disabled>ROLL THE DICE</button>

    <div class="card">
      <div class="card-label">shot log</div>
      <div class="log" id="log">Select a shot and direction to tee off.</div>
    </div>
  </div>
</div>

<div class="sc-wrap">
  <div class="sc-title">round scorecard</div>
  <div class="sc-row">
    <div class="sc-cell hdr">hole</div>
    <div class="sc-cell hdr">par</div>
    <div class="sc-cell hdr">score</div>
    <div class="sc-cell hdr">+/−</div>
    <div class="sc-cell hdr">total</div>
  </div>
  <div id="sc-rows"></div>
</div>

let holeIdx=0, ballRow=0, ballCol=0, strokes=0;
let selectedShot=null, selectedDir=null, phase='shot';
let scores=[null,null,null];
let inSand=false;

const DVEC={ul:[-1,-1],u:[-1,0],ur:[-1,1],l:[0,-1],r:[0,1],dl:[1,-1],d:[1,0],dr:[1,1]};

function h(){ return HOLES[holeIdx]; }
function d6(){ return Math.floor(Math.random()*6)+1; }

function cell(r,c){
  const hd=h();
  if(r<0||r>=hd.rows||c<0||c>=hd.cols) return 'oob';
  return hd.grid[r][c];
}

function isGreen(t){ return ['green','green1','green2','hole'].includes(t); }
function isRough(t){ return t==='rough'; }

function placeBall(){
  const hd=h();
  const pct_top  = ((ballRow+0.5)/hd.rows*100)+'%';
  const pct_left = ((ballCol+0.5)/hd.cols*100)+'%';
  const b=document.getElementById('ball');
  b.style.top=pct_top;
  b.style.left=pct_left;
}

function goToHole(idx){
  holeIdx=idx;
  const hd=h();
  ballRow=hd.tee[0]; ballCol=hd.tee[1];
  strokes=0; selectedShot=null; selectedDir=null; phase='shot'; inSand=false;

  document.querySelectorAll('.hole-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('hole-img').src=IMGS[hd.imgKey];
  placeBall();
  updateScoreUI();
  renderShotPanel();
  setLog('Select a shot and direction to tee off.');
  updateRollBtn();
  renderScorecard();
}

function selectShot(s){
  if(phase!=='shot') return;
  if(inSand && s==='power'){
    setLog(`<span class="bad">⚠ Power not allowed from sand!</span>`);
    return;
  }
  selectedShot=s;
  ['power','control','finesse'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===s));
  updateRollBtn();
}

function selectDir(d){
  if(phase!=='shot') return;
  selectedDir=d;
  const keys=['ul','u','ur','l','','r','dl','d','dr'];
  document.querySelectorAll('.dir-btn').forEach((b,i)=>{
    if(!b.classList.contains('empty')) b.classList.toggle('active',keys[i]===d);
  });
  updateRollBtn();
}

function updateRollBtn(){
  const btn=document.getElementById('roll-btn');
  if(!btn) return;
  btn.disabled=!(selectedShot&&selectedDir&&phase==='shot');
}

function calcMove(shot, die){
  if(shot==='power'){
    if(die<=2) return {move:2,side:2};
    if(die<=4) return {move:3,side:1};
    return {move:4,side:0};
  } else if(shot==='control'){
    if(die===1) return {move:1,side:0};
    if(die<=4) return {move:2,side:0};
    return {move:3,side:0};
  } else {
    if(die<=2) return {move:1,side:-1};
    if(die<=4) return {move:1,side:0};
    return {move:2,side:0};
  }
}

function applyMove(fromR,fromC,vec,move,side){
  const hd=h();
  let r=fromR+vec[0]*move;
  let c=fromC+vec[1]*move+side;
  r=Math.max(0,Math.min(hd.rows-1,r));
  c=Math.max(0,Math.min(hd.cols-1,c));
  return [r,c];
}

function rollShot(){
  if(phase!=='shot') return;
  let die=d6();
  let sandPenalty='';
  if(inSand){
    const rawDie=die;
    if(selectedShot==='control'){ die=Math.max(1,die-2); sandPenalty=`<span class="warn"> (sand: rolled ${rawDie}, −2 = ${die})</span>`; }
    else if(selectedShot==='finesse'){ die=Math.max(1,die-1); sandPenalty=`<span class="warn"> (sand: rolled ${rawDie}, −1 = ${die})</span>`; }
    inSand=false;
  }
  const {move,side}=calcMove(selectedShot,die);
  const vec=DVEC[selectedDir];
  const [nr,nc]=applyMove(ballRow,ballCol,vec,move,side);

  strokes++;
  ballRow=nr; ballCol=nc;
  placeBall();
  updateScoreUI();

  const landed=cell(ballRow,ballCol);
  let shotLabel='';
  if(selectedShot==='power') shotLabel=die<=2?`d6:${die} Move 2, SLICE 2`:die<=4?`d6:${die} Move 3, SLICE 1`:`d6:${die} Move 4`;
  else if(selectedShot==='control') shotLabel=die===1?`d6:${die} Move 1`:die<=4?`d6:${die} Move 2`:`d6:${die} Move 3`;
  else shotLabel=die<=2?`d6:${die} Move 1, DRAW 1`:die<=4?`d6:${die} Move 1`:`d6:${die} Move 2`;

  let lines=[`<span class="hi">${selectedShot.toUpperCase()} · ${shotLabel}</span>${sandPenalty}`];

  if(landed==='water'){
    strokes++;
    lines.push(`<span class="bad">⚠ Water! +1 penalty stroke.</span>`);
    const dz=h().dropZone;
    ballRow=dz[0]; ballCol=dz[1];
    lines.push(`<span class="warn">Dropped at drop zone.</span>`);
    placeBall(); updateScoreUI();
    setLog(lines.join('<br>')); resetControls(); return;
  }

  if(landed==='trees'){
    phase='trees';
    lines.push(`<span class="warn">⚠ Trees! Rolling for deflection...</span>`);
    setLog(lines.join('<br>'));
    const shotForDeflect=selectedShot;
    const dirForDeflect=selectedDir;
    resetControls();
    phase='trees';
    setTimeout(()=>doTrees(lines,shotForDeflect,dirForDeflect),700);
    return;
  }

  if(landed==='sand'){ inSand=true; lines.push(`<span class="warn">⚠ Sand! Control −2 · Finesse −1 · Power not allowed.</span>`); }
  if(landed==='rough') lines.push(`<span class="warn">Rough. Tougher lie ahead.</span>`);

  if(isGreen(landed)||landed==='hole'){
    lines.push(`<span class="good">On the green!</span>`);
    setLog(lines.join('<br>'));
    setTimeout(()=>doPutt(lines),500);
    return;
  }

  setLog(lines.join('<br>')); resetControls();
}

function doTrees(prevLines,shot,dir){
  const dDie=d6();
  let deflect, dLabel;
  if(dDie<=2){deflect='left'; dLabel=`d6:${dDie} — deflects LEFT`;}
  else if(dDie<=4){deflect='straight'; dLabel=`d6:${dDie} — goes STRAIGHT`;}
  else{deflect='right'; dLabel=`d6:${dDie} — deflects RIGHT`;}

  const distDie=d6();
  const {move}=calcMove(shot,distDie);

  const vec=DVEC[dir];
  let nr=ballRow, nc=ballCol;
  if(deflect==='straight'){nr+=vec[0]*move; nc+=vec[1]*move;}
  else if(deflect==='left'){nr+=vec[1]*move; nc+=(-vec[0])*move;}
  else{nr+=(-vec[1])*move; nc+=vec[0]*move;}

  const hd=h();
  nr=Math.max(0,Math.min(hd.rows-1,nr));
  nc=Math.max(0,Math.min(hd.cols-1,nc));
  ballRow=nr; ballCol=nc;
  placeBall(); updateScoreUI();

  const landed=cell(ballRow,ballCol);
  let lines=[...prevLines,`<span class="warn">${dLabel} · dist d6:${distDie} → Move ${move}</span>`];

  if(isGreen(landed)||landed==='hole'){
    lines.push(`<span class="good">Scrambled onto the green!</span>`);
    setLog(lines.join('<br>'));
    setTimeout(()=>doPutt(lines),500);
    phase='shot'; return;
  }
  if(landed==='trees') lines.push(`<span class="bad">Still in trees.</span>`);
  phase='shot';
  setLog(lines.join('<br>')); resetControls();
}

function doPutt(prevLines){
  const key=`${ballRow},${ballCol}`;
  const zone=h().putt[key];

  if(zone===0){
    setLog([...(prevLines||[]),`<span class="good">Holed out directly!</span>`].join('<br>'));
    finishHole(); return;
  }

  // Show putt zone info and prompt player to roll
  phase='putt';
  let zoneDesc = zone===1
    ? '1-dot zone: roll 1–3 = 2 putts · 4–6 = 1 putt'
    : '2-dot zone: roll 1–2 = 3 putts · 3–4 = 2 putts · 5–6 = 1 putt';

  const lines=[...(prevLines||[]),`<span class="good">On the green!</span>`,`<span class="hi">${zoneDesc}</span>`];
  setLog(lines.join('<br>'));

  // Replace shot card with putt prompt, hide dir pad
  document.getElementById('dir-card').style.display='none';
  document.getElementById('shot-card').innerHTML=`<div class="card-label">putting</div>
    <div style="font-size:0.72rem;color:#9aca9a;margin-bottom:8px">${zoneDesc}</div>`;

  const rb=document.getElementById('roll-btn');
  rb.textContent='ROLL FOR PUTTS';
  rb.disabled=false;
  rb.onclick=()=>{
    const die=d6();
    let putts;
    if(zone===1){ putts=die<=3?2:1; }
    else { putts=die<=2?3:die<=4?2:1; }
    strokes+=putts; updateScoreUI();
    setLog([...lines,`<span class="hi">Putt d6: ${die} → ${putts} putt${putts>1?'s':''}</span>`].join('<br>'));
    finishHole();
  };
}

function finishHole(){
  scores[holeIdx]=strokes;
  phase='complete';
  renderScorecard();

  const diff=strokes-h().par;
  // Hole-in-one: par 3, hole 1 (idx 0), score = 1
  const isHIO = holeIdx===0 && strokes===1;
  let word, cls;
  if(isHIO){ word='Hole in One! 🎱'; cls='r-eagle'; }
  else if(diff<=-2){ word='Eagle 🦅'; cls='r-eagle'; }
  else if(diff===-1){ word='Birdie 🐦'; cls='r-birdie'; }
  else if(diff===0){ word='Par'; cls='r-par'; }
  else if(diff===1){ word='Bogey'; cls='r-bogey'; }
  else { word=`+${diff}`; cls='r-bad'; }

  document.getElementById('shot-card').innerHTML=`<div class="card-label">result</div>
    <div class="hole-complete">
      <div class="result-word ${cls}">${word}</div>
      <div style="font-size:0.72rem;color:#7ab87a;margin-top:6px">${strokes} strokes · par ${h().par}</div>
    </div>`;
  document.getElementById('dir-card').style.display='none';

  const rb=document.getElementById('roll-btn');
  if(holeIdx<2){
    rb.textContent='NEXT HOLE →';
    rb.disabled=false;
    rb.onclick=()=>goToHole(holeIdx+1);
  } else {
    rb.textContent='ROUND COMPLETE';
    rb.disabled=true;
  }
}

function resetControls(){
  selectedShot=null; selectedDir=null;
  if(phase!=='trees') phase='shot';
  ['power','control','finesse'].forEach(x=>document.getElementById('btn-'+x)&&document.getElementById('btn-'+x).classList.remove('active'));
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
  // Re-dim power button if in sand
  const powerBtn=document.getElementById('btn-power');
  if(powerBtn && inSand) powerBtn.style.opacity='0.35';
  else if(powerBtn) powerBtn.style.opacity='';
  updateRollBtn();
}

function renderShotPanel(){
  document.getElementById('dir-card').innerHTML=`<div class="card-label">1 · aim</div>
    <div class="dir-pad">
      <button class="dir-btn" onclick="selectDir('ul')">↖</button>
      <button class="dir-btn" onclick="selectDir('u')">↑</button>
      <button class="dir-btn" onclick="selectDir('ur')">↗</button>
      <button class="dir-btn" onclick="selectDir('l')">←</button>
      <button class="dir-btn empty"></button>
      <button class="dir-btn" onclick="selectDir('r')">→</button>
      <button class="dir-btn" onclick="selectDir('dl')">↙</button>
      <button class="dir-btn" onclick="selectDir('d')">↓</button>
      <button class="dir-btn" onclick="selectDir('dr')">↘</button>
    </div>`;
  document.getElementById('shot-card').innerHTML=`<div class="card-label">2 · choose shot</div>
    <div class="shot-btns">
      <button class="shot-btn" onclick="selectShot('power')" id="btn-power">POWER<span>move 2–4</span></button>
      <button class="shot-btn" onclick="selectShot('control')" id="btn-control">CONTROL<span>move 1–3</span></button>
      <button class="shot-btn" onclick="selectShot('finesse')" id="btn-finesse">FINESSE<span>move 1–2</span></button>
    </div>`;
  document.getElementById('dir-card').style.display='';
  const rb=document.getElementById('roll-btn');
  rb.textContent='ROLL THE DICE';
  rb.onclick=rollShot;
}

function updateScoreUI(){
  document.getElementById('sc-hole').textContent=h().num;
  document.getElementById('sc-par').textContent=h().par;
  document.getElementById('sc-strokes').textContent=strokes;
}

function setLog(html){ document.getElementById('log').innerHTML=html; }

function renderScorecard(){
  let running=0;
  document.getElementById('sc-rows').innerHTML=HOLES.map((hd,i)=>{
    const s=scores[i];
    if(s===null) return `<div class="sc-row"><div class="sc-cell">${i+1}</div><div class="sc-cell">${hd.par}</div><div class="sc-cell">—</div><div class="sc-cell">—</div><div class="sc-cell">—</div></div>`;
    running+=s;
    const diff=s-hd.par;
    const cls=diff<0?'sc-under':diff>0?'sc-over':'sc-par';
    return `<div class="sc-row"><div class="sc-cell">${i+1}</div><div class="sc-cell">${hd.par}</div><div class="sc-cell ${cls}">${s}</div><div class="sc-cell ${cls}">${diff===0?'E':diff>0?'+'+diff:diff}</div><div class="sc-cell">${running}</div></div>`;
  }).join('');
}

goToHole(0);
</script>
</body>
</html>
